<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Navi — Sarajevo's best-kept spots, in your language.">
  <title>Navi — Sarajevo</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/categories.css">
  <link rel="stylesheet" href="css/card.css">
  <link rel="stylesheet" href="css/ask.css">
  <link rel="stylesheet" href="css/right-now.css">
</head>
<body>
  <header id="topbar" role="banner">
    <div class="brand" aria-label="Navi">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 0C3.582 0 0 3.582 0 8c0 5.5 8 12 8 12s8-6.5 8-12c0-4.418-3.582-8-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
        </svg>
      </span>
      <span class="brand-name">Navi</span>
    </div>
    <nav class="lang-switcher" aria-label="Language">
      <button type="button" class="lang-btn active" data-lang="en" aria-label="English"><img src="https://flagcdn.com/w40/gb.png" alt="" width="22" height="16" loading="lazy"></button>
      <button type="button" class="lang-btn" data-lang="tr" aria-label="Türkçe"><img src="https://flagcdn.com/w40/tr.png" alt="" width="22" height="16" loading="lazy"></button>
      <button type="button" class="lang-btn" data-lang="ar" aria-label="العربية"><img src="https://flagcdn.com/w40/sa.png" alt="" width="22" height="16" loading="lazy"></button>
      <button type="button" class="lang-btn" data-lang="de" aria-label="Deutsch"><img src="https://flagcdn.com/w40/de.png" alt="" width="22" height="16" loading="lazy"></button>
      <button type="button" class="lang-btn" data-lang="zh" aria-label="中文"><img src="https://flagcdn.com/w40/cn.png" alt="" width="22" height="16" loading="lazy"></button>
    </nav>
  </header>
  <div id="map" role="application" aria-label="Map of Sarajevo"></div>
  <div id="right-now" class="right-now" hidden></div>
  <nav id="categories" role="tablist" aria-label="Filter places by category"></nav>
  <section id="list" aria-label="Places to visit"></section>

  <!-- Ask a Sarajevan modal -->
  <div id="ask-overlay" class="ask-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="ask-title">
    <div id="ask-panel" class="ask-panel">
      <div class="ask-header">
        <div>
          <h2 id="ask-title" class="ask-title">Ask a Sarajevan</h2>
          <p class="ask-subtitle">Right now that's Faris, the founder. Replies usually within a few hours, sent to your email.</p>
        </div>
        <button type="button" class="ask-close" data-ask-close aria-label="Close">&times;</button>
      </div>
      <div id="ask-place" class="ask-place" hidden></div>
      <form id="ask-form" novalidate>
        <div class="ask-field">
          <label for="ask-question">Your question</label>
          <textarea id="ask-question" required maxlength="1000"
                    placeholder="Is it open Saturday? Can I bring my dog? Should I tip?"></textarea>
        </div>
        <div class="ask-field">
          <label for="ask-name">Your first name</label>
          <input type="text" id="ask-name" required maxlength="60" autocomplete="given-name">
        </div>
        <div class="ask-field">
          <label for="ask-email">Email (where we'll reply)</label>
          <input type="email" id="ask-email" required autocomplete="email">
        </div>
        <div class="ask-actions">
          <button type="button" class="ask-btn ask-btn--ghost" data-ask-close>Cancel</button>
          <button type="submit" id="ask-submit" class="ask-btn ask-btn--primary">Ask</button>
        </div>
      </form>
      <div id="ask-state" hidden></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin="anonymous"
          defer></script>
  <script src="js/map.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/card.js" defer></script>
  <script src="js/categories.js" defer></script>
  <script src="js/ask.js" defer></script>
  <script src="js/right-now.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
